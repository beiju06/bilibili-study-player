<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Bilibili Study Player</title>

<style>

body{
background:#181818;
color:white;
font-family:sans-serif;
margin:0;
text-align:center;
}

.topbar{
padding:12px;
background:#202020;
display:flex;
justify-content:space-between;
align-items:center;
}

#speedArea span{
margin-left:10px;
cursor:pointer;
color:#ff6699;
}

#cover{
width:320px;
border-radius:10px;
margin-top:30px;
}

#title{
font-size:20px;
margin-top:15px;
}

#meta{
color:#aaa;
margin-top:5px;
}

#playBtn{
margin-top:20px;
padding:10px 20px;
background:#ff6699;
border:none;
color:white;
cursor:pointer;
font-size:16px;
border-radius:6px;
}

.player{
width:100%;
height:85vh;
border:none;
margin-top:10px;
}

.comments{
width:100%;
height:40vh;
border:none;
background:white;
}

</style>

</head>

<body>

<div class="topbar">

<button onclick="goBack()">Back</button>

<div id="speedArea"></div>

</div>

<div id="infoArea">

<img id="cover">

<div id="title"></div>

<div id="meta"></div>

<button id="playBtn">Play</button>

</div>

<iframe id="player" class="player" style="display:none"></iframe>

<script>

function goBack(){
window.location="index.html";
}

function getParam(name){
let url=new URL(window.location.href);
return url.searchParams.get(name);
}

let inputUrl=getParam("url");

function extractID(link){

if(!link) return null;

let bv=link.match(/BV[a-zA-Z0-9]+/);
if(bv) return bv[0];

let av=link.match(/av\d+/);
if(av) return av[0];

return null;

}

let id=extractID(inputUrl);

async function loadInfo(){

if(!id){

document.getElementById("title").innerText="Invalid link";
return;

}

let api;

if(id.startsWith("BV")){
api="https://api.bilibili.com/x/web-interface/view?bvid="+id;
}else{
api="https://api.bilibili.com/x/web-interface/view?aid="+id.replace("av","");
}

try{

let res=await fetch(api);
let json=await res.json();

let data=json.data;

document.getElementById("cover").src=data.pic;

document.getElementById("title").innerText=data.title;

document.getElementById("meta").innerText=
data.owner.name+" | "+data.stat.view+" views";

}catch{
  
}

}

loadInfo();

document.getElementById("playBtn").onclick=function(){

document.getElementById("infoArea").style.display="none";

let playerUrl;

if(id.startsWith("BV")){
playerUrl="https://player.bilibili.com/player.html?bvid="+id+"&danmaku=1";
}else{
playerUrl="https://player.bilibili.com/player.html?aid="+id.replace("av","")+"&danmaku=1";
}

let player=document.getElementById("player");

player.src=playerUrl;

player.style.display="block";

};

const speeds=[0.75,1,1.25,1.5,2];

let speedArea=document.getElementById("speedArea");

speeds.forEach(function(s){

let btn=document.createElement("span");

btn.innerText=s+"x";

btn.onclick=function(){

let player=document.getElementById("player");

if(player.contentWindow){

player.contentWindow.postMessage({
command:"setPlaybackRate",
value:s
},"*");

}

};

speedArea.appendChild(btn);

});

</script>

</body>

</html>
